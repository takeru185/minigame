<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>忍たま乱太郎 4択クイズ</title>
<style>
:root {
 --bg:#07132a;--panel:#10264a;--panel2:#17345f;--text:#f7fbff;--muted:#b8c9df;
 --accent:#f2cf45;--accent2:#4dc6eb;--good:#52d790;--bad:#ff7474;--line:#31557f;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
background:radial-gradient(circle at top,#174d73 0,#07132a 50%);color:var(--text)}
.app{width:min(760px,92vw);margin:0 auto;padding:30px 0 50px}
.brand{font-size:clamp(24px,4.2vw,36px);font-weight:1000;letter-spacing:.07em;color:var(--accent)}
.sub{margin-top:6px;color:var(--muted)}
.card{margin-top:24px;background:rgba(16,38,74,.96);border:1px solid var(--line);border-radius:20px;
padding:clamp(20px,4vw,34px);box-shadow:0 18px 60px rgba(0,0,0,.36)}
.center{text-align:center} .hidden{display:none}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}
.badge{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-weight:800}
.progress{height:10px;background:#061020;border-radius:999px;overflow:hidden;margin:14px 0 26px}
.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
h1{font-size:clamp(22px,3.6vw,32px);line-height:1.45;margin:0 0 24px}
.answers{display:grid;gap:12px}
button{font:inherit}
.choice{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:16px 18px;
border-radius:14px;text-align:left;cursor:pointer;font-weight:800;transition:.18s}
.choice:hover{transform:translateY(-1px);border-color:#6c96c5}
.choice.correct{background:rgba(82,215,144,.15);border-color:var(--good)}
.choice.wrong{background:rgba(255,116,116,.15);border-color:var(--bad)}
.choice:disabled{cursor:default;transform:none}
.feedback{min-height:28px;margin-top:18px;font-weight:900}
.feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
.primary{border:0;background:linear-gradient(90deg,var(--accent),#fff084);color:#102044;border-radius:14px;
padding:14px 22px;font-weight:1000;cursor:pointer}
.primary:hover{filter:brightness(1.05)}
.score{font-size:clamp(48px,10vw,84px);font-weight:1000;color:var(--accent);margin:10px 0}
.rank{font-size:24px;font-weight:1000;margin-bottom:12px}
.note{color:var(--muted);line-height:1.7}
.footer{margin-top:18px;text-align:center;color:#89a2c0;font-size:12px}
@media(max-width:520px){.app{padding-top:18px}.card{padding:18px;border-radius:16px}}
</style>
</head>
<body>
<div class="app">
 <div class="brand">忍たま乱太郎 QUIZ</div>
 <div class="sub">100問の問題プールから、毎回ランダムで10問出題</div>

 <section id="start" class="card center">
  <h1>忍術学園の知識を試せ</h1>
  <p class="note">4択・全10問。問題と選択肢は毎回ランダムです。<br>一年生から上級生、先生、委員会、城の忍者まで出題します。</p>
  <button class="primary" id="startBtn">クイズ開始</button>
 </section>

 <section id="quiz" class="card hidden">
  <div class="topbar">
   <div class="badge" id="counter">第1問 / 10問</div>
   <div class="badge" id="scoreMini">正解 0</div>
  </div>
  <div class="progress"><div id="bar"></div></div>
  <h1 id="question"></h1>
  <div id="answers" class="answers"></div>
  <div id="feedback" class="feedback"></div>
  <button class="primary hidden" id="nextBtn">次の問題へ</button>
 </section>

 <section id="result" class="card center hidden">
  <div class="note">最終結果</div>
  <div class="score" id="finalScore">0 / 10</div>
  <div class="rank" id="rank"></div>
  <p class="note" id="comment"></p>
  <button class="primary" id="retryBtn">別の10問に挑戦</button>
 </section>

 <div class="footer">非公式ファンメイドクイズ。作品画像・音声は使用していません。</div>
</div>

const QUIZ_LENGTH=10;
let quiz=[],index=0,score=0,locked=false;
const $=s=>document.querySelector(s);
const shuffle=arr=>{
 const a=[...arr];
 for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
 return a;
};
function startQuiz(){
 quiz=shuffle(QUESTION_POOL).slice(0,QUIZ_LENGTH);
 index=0;score=0;
 $("#start").classList.add("hidden");
 $("#result").classList.add("hidden");
 $("#quiz").classList.remove("hidden");
 renderQuestion();
}
function renderQuestion(){
 locked=false;
 const item=quiz[index];
 $("#counter").textContent=`第${index+1}問 / ${QUIZ_LENGTH}問`;
 $("#scoreMini").textContent=`正解 ${score}`;
 $("#bar").style.width=`${index/QUIZ_LENGTH*100}%`;
 $("#question").textContent=item.q;
 $("#feedback").textContent="";
 $("#feedback").className="feedback";
 $("#nextBtn").classList.add("hidden");
 const box=$("#answers");box.innerHTML="";
 shuffle([item.a,...item.c]).forEach(text=>{
  const b=document.createElement("button");
  b.className="choice";b.textContent=text;
  b.onclick=()=>answer(b,text,item.a);
  box.appendChild(b);
 });
}
function answer(btn,selected,correct){
 if(locked)return;
 locked=true;
 [...document.querySelectorAll(".choice")].forEach(b=>{
  b.disabled=true;
  if(b.textContent===correct)b.classList.add("correct");
 });
 if(selected===correct){
  score++;$("#feedback").textContent="正解！";$("#feedback").classList.add("good");
 }else{
  btn.classList.add("wrong");
  $("#feedback").textContent=`不正解。正解は「${correct}」`;
  $("#feedback").classList.add("bad");
 }
 $("#scoreMini").textContent=`正解 ${score}`;
 $("#nextBtn").textContent=index===QUIZ_LENGTH-1?"結果を見る":"次の問題へ";
 $("#nextBtn").classList.remove("hidden");
}
function next(){
 index++;
 if(index>=QUIZ_LENGTH)showResult();else renderQuestion();
}
function showResult(){
 $("#quiz").classList.add("hidden");
 $("#result").classList.remove("hidden");
 $("#finalScore").textContent=`${score} / ${QUIZ_LENGTH}`;
 let rank,comment;
 if(score===10){rank="忍術学園教師クラス";comment="全問正解。学園長も認める知識量です。";}
 else if(score>=8){rank="六年生クラス";comment="かなり詳しいです。立派な忍者まであと一歩。";}
 else if(score>=6){rank="上級生クラス";comment="十分な実力。別の10問にも挑戦してください。";}
 else if(score>=4){rank="一年は組クラス";comment="基礎知識はあります。授業を続けましょう。";}
 else{rank="忍者のたまご見習い";comment="まずは忍術学園の日常を振り返って再挑戦。";}
 $("#rank").textContent=rank;
 $("#comment").textContent=comment;
}
