<html lang="ja">
<head>

<title>鬼滅の刃 4択クイズ</title>
<style>
:root {
 --bg:#15090b;--panel:#251215;--panel2:#351a1f;--text:#fff7f2;--muted:#d5b8b8;
 --accent:#e55b54;--accent2:#f0b64f;--good:#55d98d;--bad:#ff7777;--line:#5a3035;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
background:radial-gradient(circle at top,#4b2025 0,#15090b 48%);color:var(--text)}
.app{width:min(760px,92vw);margin:0 auto;padding:30px 0 50px}
.brand{font-size:clamp(24px,4.2vw,36px);font-weight:1000;letter-spacing:.08em;color:var(--accent2)}
.sub{margin-top:6px;color:var(--muted)}
.card{margin-top:24px;background:rgba(37,18,21,.96);border:1px solid var(--line);border-radius:20px;
padding:clamp(20px,4vw,34px);box-shadow:0 18px 60px rgba(0,0,0,.38)}
.center{text-align:center} .hidden{display:none}
.topbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}
.badge{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-weight:800}
.progress{height:10px;background:#100608;border-radius:999px;overflow:hidden;margin:14px 0 26px}
.progress>div{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:.3s}
h1{font-size:clamp(22px,3.6vw,32px);line-height:1.45;margin:0 0 24px}
.answers{display:grid;gap:12px}
button{font:inherit}
.choice{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:16px 18px;
border-radius:14px;text-align:left;cursor:pointer;font-weight:800;transition:.18s}
.choice:hover{transform:translateY(-1px);border-color:#96606a}
.choice.correct{background:rgba(85,217,141,.14);border-color:var(--good)}
.choice.wrong{background:rgba(255,119,119,.14);border-color:var(--bad)}
.choice:disabled{cursor:default;transform:none}
.feedback{min-height:28px;margin-top:18px;font-weight:900}
.feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
.primary{border:0;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#210b0d;border-radius:14px;
padding:14px 22px;font-weight:1000;cursor:pointer}
.primary:hover{filter:brightness(1.05)}
.score{font-size:clamp(48px,10vw,84px);font-weight:1000;color:var(--accent2);margin:10px 0}
.rank{font-size:24px;font-weight:1000;margin-bottom:12px}
.note{color:var(--muted);line-height:1.7}
.footer{margin-top:18px;text-align:center;color:#a48787;font-size:12px}
@media(max-width:520px){.app{padding-top:18px}.card{padding:18px;border-radius:16px}}
</style>
</head>
<body>
<div class="app">
 <div class="brand">鬼滅の刃 QUIZ</div>

  <button class="primary" id="startBtn">クイズ開始</button>
 </section>

 <section id="quiz" class="card hidden">
  <div class="topbar">
   <div class="badge" id="counter">第1問 / 10問</div>
   <div class="badge" id="scoreMini">正解 0</div>
  </div>
  <div class="progress"><div id="bar"></div></div>
  <h1 id="question"></h1>
  <div id="answers" class="answers"></div>
  <div id="feedback" class="feedback"></div>
  <button class="primary hidden" id="nextBtn">次の問題へ</button>
 </section>

 <section id="result" class="card center hidden">
  <div class="note">最終結果</div>
  <div class="score" id="finalScore">0 / 10</div>
  <div class="rank" id="rank"></div>
  <p class="note" id="comment"></p>
  <button class="primary" id="retryBtn">別の10問に挑戦</button>
 </section>

 <div class="footer">非公式ファンメイドクイズ。作品画像・音声は使用していません。</div>
</div>

const $=s=>document.querySelector(s);
const shuffle=arr=>{
 const a=[...arr];
 for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
 return a;
};
function startQuiz(){
 quiz=shuffle(QUESTION_POOL).slice(0,QUIZ_LENGTH);
 index=0;score=0;
 $("#start").classList.add("hidden");
 $("#result").classList.add("hidden");
 $("#quiz").classList.remove("hidden");
 renderQuestion();
}
function renderQuestion(){
 locked=false;
 const item=quiz[index];
 $("#counter").textContent=`第${index+1}問 / ${QUIZ_LENGTH}問`;
 $("#scoreMini").textContent=`正解 ${score}`;
 $("#bar").style.width=`${index/QUIZ_LENGTH*100}%`;
 $("#question").textContent=item.q;
 $("#feedback").textContent="";
 $("#feedback").className="feedback";
 $("#nextBtn").classList.add("hidden");
 const box=$("#answers");box.innerHTML="";
 shuffle([item.a,...item.c]).forEach(text=>{
  const b=document.createElement("button");
  b.className="choice";b.textContent=text;
  b.onclick=()=>answer(b,text,item.a);
  box.appendChild(b);
 });
}
function answer(btn,selected,correct){
 if(locked)return;
 locked=true;
 [...document.querySelectorAll(".choice")].forEach(b=>{
  b.disabled=true;
  if(b.textContent===correct)b.classList.add("correct");
 });
 if(selected===correct){
  score++;$("#feedback").textContent="正解！";$("#feedback").classList.add("good");
 }else{
  btn.classList.add("wrong");
  $("#feedback").textContent=`不正解。正解は「${correct}」`;
  $("#feedback").classList.add("bad");
 }
 $("#scoreMini").textContent=`正解 ${score}`;
 $("#nextBtn").textContent=index===QUIZ_LENGTH-1?"結果を見る":"次の問題へ";
 $("#nextBtn").classList.remove("hidden");
}
function next(){
 index++;
 if(index>=QUIZ_LENGTH)showResult();else renderQuestion();
}
function showResult(){
 $("#quiz").classList.add("hidden");
 $("#result").classList.remove("hidden");
 $("#finalScore").textContent=`${score} / ${QUIZ_LENGTH}`;
 let rank,comment;
 if(score===10){rank="柱クラス";comment="全問正解。鬼殺隊最高峰の知識です。";}
 else if(score>=8){rank="甲クラス";comment="かなり詳しいです。あと少しで柱級。";}
 else if(score>=6){rank="継子クラス";comment="十分な実力。別の10問にも挑戦してください。";}
 else if(score>=4){rank="鬼殺隊士クラス";comment="基礎知識はあります。再挑戦で伸ばせます。";}
 else{rank="最終選別挑戦者";comment="物語を振り返ってから再挑戦。";}
 $("#rank").textContent=rank;
 $("#comment").textContent=comment;
}
$("#startBtn").onclick=startQuiz;
$("#retryBtn").onclick=startQuiz;
$("#nextBtn").onclick=next;
</script>
