<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HUNTER×HUNTER 4択クイズ</title>
<style>
:root {
  --bg:#0b1220; --panel:#111b2e; --panel2:#16233a; --text:#eef4ff;
  --muted:#9fb0c9; --accent:#f1c84b; --good:#41d18a; --bad:#ff6b6b;
  --line:#2a3b59;
}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
background:radial-gradient(circle at top,#182b49 0,#0b1220 45%);color:var(--text);}
.app{width:min(760px,92vw);margin:0 auto;padding:32px 0 48px}
.brand{font-weight:900;letter-spacing:.08em;color:var(--accent);font-size:clamp(22px,4vw,34px)}
.sub{color:var(--muted);margin-top:6px}
.card{margin-top:24px;background:rgba(17,27,46,.94);border:1px solid var(--line);border-radius:20px;
padding:clamp(20px,4vw,34px);box-shadow:0 18px 60px rgba(0,0,0,.32)}
.topbar{display:flex;gap:12px;align-items:center;justify-content:space-between;margin-bottom:18px}
.badge{background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:8px 13px;font-weight:700}
.progress{height:10px;background:#0a1020;border-radius:999px;overflow:hidden;margin:14px 0 26px}
.progress>div{height:100%;background:linear-gradient(90deg,#f1c84b,#ff8a4c);transition:.3s}
h1{font-size:clamp(22px,3.6vw,32px);line-height:1.45;margin:0 0 24px}
.answers{display:grid;gap:12px}
button{font:inherit}
.choice{width:100%;border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:16px 18px;
border-radius:14px;text-align:left;cursor:pointer;font-weight:700;transition:.18s}
.choice:hover{transform:translateY(-1px);border-color:#5d78a0}
.choice.correct{background:rgba(65,209,138,.15);border-color:var(--good)}
.choice.wrong{background:rgba(255,107,107,.15);border-color:var(--bad)}
.choice:disabled{cursor:default;transform:none}
.feedback{min-height:28px;margin-top:18px;font-weight:800}
.feedback.good{color:var(--good)} .feedback.bad{color:var(--bad)}
.primary{border:0;background:var(--accent);color:#151515;border-radius:14px;padding:14px 22px;font-weight:900;cursor:pointer}
.primary:hover{filter:brightness(1.06)}
.center{text-align:center}
.score{font-size:clamp(48px,10vw,84px);font-weight:1000;color:var(--accent);margin:10px 0}
.rank{font-size:24px;font-weight:900;margin-bottom:12px}
.note{color:var(--muted);line-height:1.7}
.footer{margin-top:18px;color:#7f91ad;font-size:12px;text-align:center}
.hidden{display:none}
@media(max-width:520px){.app{padding-top:18px}.card{border-radius:16px;padding:18px}}
</style>
</head>
<body>
<div class="app">
  <div class="brand">HUNTER×HUNTER QUIZ</div>
  <div class="sub">100問の問題プールから、毎回ランダムで10問出題</div>

  <section id="start" class="card center">
    <h1>ハンター知識を試せ</h1>
    <p class="note">4択・全10問。問題と選択肢は毎回ランダムです。<br>原作・アニメのネタバレを含みます。</p>
    <button class="primary" id="startBtn">クイズ開始</button>
  </section>

  <section id="quiz" class="card hidden">
    <div class="topbar">
      <div class="badge" id="counter">第1問 / 10問</div>
      <div class="badge" id="scoreMini">正解 0</div>
    </div>
    <div class="progress"><div id="bar"></div></div>
    <h1 id="question"></h1>
    <div id="answers" class="answers"></div>
    <div id="feedback" class="feedback"></div>
    <button class="primary hidden" id="nextBtn">次の問題へ</button>
  </section>

  <section id="result" class="card center hidden">
    <div class="note">最終結果</div>
    <div class="score" id="finalScore">0 / 10</div>
    <div class="rank" id="rank"></div>
    <p class="note" id="comment"></p>
    <button class="primary" id="retryBtn">別の10問に挑戦</button>
  </section>
  <div class="footer">非公式ファンメイドクイズ。作品画像・音声は使用していません。</div>
</div>

const QUIZ_LENGTH = 10;
let quiz=[], index=0, score=0, locked=false;

const $ = s => document.querySelector(s);
const shuffle = arr => {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}
  return a;
};

function startQuiz(){
  quiz=shuffle(QUESTION_POOL).slice(0,QUIZ_LENGTH);
  index=0; score=0;
  $("#start").classList.add("hidden");
  $("#result").classList.add("hidden");
  $("#quiz").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion(){
  locked=false;
  const item=quiz[index];
  $("#counter").textContent=`第${index+1}問 / ${QUIZ_LENGTH}問`;
  $("#scoreMini").textContent=`正解 ${score}`;
  $("#bar").style.width=`${(index/QUIZ_LENGTH)*100}%`;
  $("#question").textContent=item.q;
  $("#feedback").textContent="";
  $("#feedback").className="feedback";
  $("#nextBtn").classList.add("hidden");
  const choices=shuffle([item.a,...item.c]);
  const box=$("#answers"); box.innerHTML="";
  choices.forEach(text=>{
    const btn=document.createElement("button");
    btn.className="choice";
    btn.textContent=text;
    btn.onclick=()=>answer(btn,text,item.a);
    box.appendChild(btn);
  });
}

function answer(btn,selected,correct){
  if(locked)return;
  locked=true;
  const buttons=[...document.querySelectorAll(".choice")];
  buttons.forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct)b.classList.add("correct");
  });
  if(selected===correct){
    score++;
    $("#feedback").textContent="正解！";
    $("#feedback").classList.add("good");
  }else{
    btn.classList.add("wrong");
    $("#feedback").textContent=`不正解。正解は「${correct}」`;
    $("#feedback").classList.add("bad");
  }
  $("#scoreMini").textContent=`正解 ${score}`;
  $("#nextBtn").textContent=index===QUIZ_LENGTH-1?"結果を見る":"次の問題へ";
  $("#nextBtn").classList.remove("hidden");
}

function next(){
  index++;
  if(index>=QUIZ_LENGTH)showResult(); else renderQuestion();
}

function showResult(){
  $("#quiz").classList.add("hidden");
  $("#result").classList.remove("hidden");
  $("#finalScore").textContent=`${score} / ${QUIZ_LENGTH}`;
  let rank,comment;
  if(score===10){rank="三ツ星ハンター級";comment="全問正解。相当な知識量です。";}
  else if(score>=8){rank="一流ハンター級";comment="かなり詳しいです。あと少しで完全制覇。";}
  else if(score>=6){rank="プロハンター級";comment="十分な実力。別の10問にも挑戦してください。";}
  else if(score>=4){rank="ハンター試験受験者級";comment="基礎知識はあります。再挑戦で伸ばせます。";}
  else{rank="ルーキー級";comment="まずは物語を振り返ってから再挑戦。";}
  $("#rank").textContent=rank;
  $("#comment").textContent=comment;
}

$("#startBtn").onclick=startQuiz;
$("#retryBtn").onclick=startQuiz;
$("#nextBtn").onclick=next;
</script>
</body>
</html>
