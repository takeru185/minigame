<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>100マス 九九ハイライト</title>

<style>
  body {
    font-family: sans-serif;
    text-align: center;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  .buttons {
    margin-bottom: 25px;
  }

  button {
    font-size: 18px;
    padding: 8px 14px;
    margin: 4px;
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(10, 55px);
    gap: 5px;
    justify-content: center;
  }

  .box {
    width: 55px;
    height: 55px;
    border: 1px solid #999;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    background: white;
    transition: 0.2s;
  }

  .highlight {
    background: gold;
    font-weight: bold;
    transform: scale(1.05);
  }
</style>
</head>

<body>

<h1>100マス 九九ハイライト</h1>

<div class="buttons">
  <button onclick="highlight(1)">1の段</button>
  <button onclick="highlight(2)">2の段</button>
  <button onclick="highlight(3)">3の段</button>
  <button onclick="highlight(4)">4の段</button>
  <button onclick="highlight(5)">5の段</button>
  <button onclick="highlight(6)">6の段</button>
  <button onclick="highlight(7)">7の段</button>
  <button onclick="highlight(8)">8の段</button>
  <button onclick="highlight(9)">9の段</button>
  <button onclick="resetGrid()">リセット</button>
</div>

<div class="grid" id="grid"></div>

<script>
  const grid = document.getElementById("grid");

  // 1〜100を生成
  for (let i = 1; i <= 100; i++) {
    const box = document.createElement("div");
    box.className = "box";
    box.textContent = i;
    box.dataset.number = i;
    grid.appendChild(box);
  }

  // 段をハイライト
  function highlight(dan) {
    const boxes = document.querySelectorAll(".box");

    boxes.forEach(box => {
      const num = Number(box.dataset.number);

      box.classList.remove("highlight");

      if (num % dan === 0 && num <= dan * 9) {
        box.classList.add("highlight");
      }
    });
  }

  // リセット
  function resetGrid() {
    document.querySelectorAll(".box").forEach(box => {
      box.classList.remove("highlight");
    });
  }
</script>

</body>
</html>
